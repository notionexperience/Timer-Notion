<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav id="main-navbar">
    <div class="nav-left">
      <h1 class="nav-title">FocusFlow</h1>
      <button id="themeToggle" class="nav-button theme-toggle" aria-pressed="false" aria-label="Toggle theme">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z" />
    </svg>
</button>
<button id="toggleNotes" class="nav-button notes-toggle" aria-label="Toggle notes sidebar">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-8.4 8.4a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32l8.4-8.4Z" />
        <path d="M5.25 5.25a3 3 0 0 0-3 3v10.5a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3V13.5a.75.75 0 0 0-1.5 0v5.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5V8.25a1.5 1.5 0 0 1 1.5-1.5h5.25a.75.75 0 0 0 0-1.5H5.25Z" />
    </svg>
</button>
    </div>

    <div class="nav-right">


      <div id="auth-nav-items">
        <input type="email" id="emailInput" placeholder="Email" aria-label="Email" />
        <input type="password" id="passwordInput" placeholder="Password" aria-label="Password" />
        <button id="signInBtn" class="nav-button">Log In</button>
        <button id="signUpBtn" class="nav-button">Sign Up</button>
        <button id="sendResetEmailBtn" class="nav-button">Set Password</button>
      </div>

      <div id="user-nav-items" style="display: none;">
        <span id="userEmailDisplay" class="user-email"></span>
        <button id="logoutBtn" class="nav-button">Logout</button>
      </div>
    </div>
  </nav>

  <div id="mainContent">
    <div id="app-section">
        <p id="guestModeMessage" style="display:none;">
            You are in guest mode. Your tasks and notes are saved only on this device.
            <br>Sign up to save and sync across devices!
        </p>

        <div class="timer-controls">
            <input type="number" id="timeInput" class="input" min="1" placeholder="Set Time" autocomplete="off" />
            <button id="setButton" class="button">Set</button>
            <button id="startButton" class="button" disabled>Start</button>
            <button id="stopButton" class="button" disabled>Stop</button>
        </div>

        <div id="timer">0:00</div>
        <div id="timerBarContainer">
            <div id="timerBar"></div>
        </div>

        <hr class="custom-hr" />

        <div class="task-input-container">
            <label for="taskInput" class="sr-only">Add a new task</label>
            <input type="text" id="taskInput" placeholder="Add a new task" aria-label="Task Name" />
            <button id="addTaskButton" class="button">Add Task</button>
        </div>

        <div class="task-control-row">
            <select class="select-box category-select" id="categorySelect">
                <option value="Work">🏷️ Work</option>
                <option value="Personal" selected>🏷️ Personal</option>
                <option value="Health">🏷️ Health</option>
                <option value="__custom__">Add New Category…</option>
            </select>

            <select class="select-box priority-select" id="prioritySelect">
                <option value="Low">⚡ Low</option>
                <option value="Medium" selected>⚡ Medium</option>
                <option value="High">⚡ High</option>
                <option value="__custom__">Add New Priority…</option>
            </select>

            <div id="taskCountToday" class="task-counter-line">
                <div class="task-counter-content">
                    <div class="counter-text">
                        <span class="count">0</span>
                    </div>
                    <div class="task-actions">
                        <button id="clearFinishedBtn" class="reset-button">Clear Done</button>
                        <button id="resetCountBtn" class="reset-button">Reset All</button>
                    </div>
                </div>
            </div>
        </div>
        <hr class="custom-hr" />
        <ul id="taskList"></ul>

            <hr class="custom-hr" />
    </div>

  </div> <div id="notesSidebar" class="notes-sidebar">
    <div class="notes-header">
      <h2>Notes</h2>
      <button id="closeNotes" class="close-button">✖</button>
    </div>
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./script.js"></script>
  <script src="./supabase-init.js" type="module"></script>
</body>
</html>
