<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav id="main-navbar">
    <div class="nav-left">
      <h1 class="nav-title">FocusFlow</h1>
      <button id="themeToggle" class="nav-button theme-toggle" aria-pressed="false" aria-label="Toggle theme">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 0 0 0 1.061l1.591 1.59a.75.75 0 0 0 1.06-1.06ZM12 18.75a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0v-2.25a.75.75 0 0 1 .75-.75ZM5.166 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM18.75 12a.75.75 0 0 1 .75-.75h2.25a.75.75 0 0 1 0 1.5h-2.25a.75.75 0 0 1-.75-.75ZM6.166 5.106a.75.75 0 0 0-1.06-1.061l-1.591 1.59a.75.75 0 0 0 1.061 1.06l1.59-1.591ZM3 12a.75.75 0 0 1-.75-.75H.75a.75.75 0 0 1 0 1.5h1.5a.75.75 0 0 1 .75-.75Zm7.75-5.25a.75.75 0 0 0-1.5 0v.008c0 .414.336.75.75.75h.008a.75.75 0 0 0 .75-.75V6.75ZM12 10.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Zm2.25 1.5a.75.75 0 0 0 0-1.5v.008c0-.414.336-.75.75-.75h.008a.75.75 0 0 0 .75.75v-.008a.75.75 0 0 0-.75-.75H14.25Z" />
    </svg>
</button>
    </div>
    <div class="nav-right">
      <span id="userEmailDisplay" class="user-email">Guest Mode</span>
      <div id="auth-nav-items">
        <input type="email" id="emailInput" placeholder="Email" class="nav-input" />
        <input type="password" id="passwordInput" placeholder="Password" class="nav-input" />
        <button id="signInBtn" class="nav-button">Sign In</button>
        <button id="signUpBtn" class="nav-button">Sign Up</button>
        <button id="sendResetEmailBtn" class="nav-button">Forgot Password?</button>
      </div>
      <div id="user-nav-items" style="display: none;">
        <button id="logoutBtn" class="nav-button">Logout</button>
      </div>
      <button id="toggleNotes" class="nav-button notes-toggle" aria-label="Toggle notes sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path fill-rule="evenodd" d="M12 2.25a.75.75 0 0 1 .75.75v9a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM6.166 5.106a.75.75 0 0 1 0 1.06L3.39 9.24a.75.75 0 0 1-1.06-1.06L5.106 5.106a.75.75 0 0 1 1.06 0Zm11.668 0a.75.75 0 0 1 0 1.06L20.61 9.24a.75.75 0 0 1-1.06-1.06l-2.775-2.775a.75.75 0 0 1 0-1.06Zm-10.74 11.25a.75.75 0 0 1 0 1.06l-2.775 2.775a.75.75 0 0 1-1.06-1.06l2.775-2.775a.75.75 0 0 1 1.06 0Zm11.668 0a.75.75 0 0 1 0 1.06l-2.775 2.775a.75.75 0 0 0 1.06 1.06l2.775-2.775a.75.75 0 0 0 0-1.06ZM12 18.75a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0v-2.25a.75.75 0 0 1 .75-.75Z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  </nav>

  <div id="mainContent">
    <div id="auth-section">
      <!-- Auth forms (hidden if logged in) -->
      <p id="guestModeMessage" style="display: none;">You are in guest mode. Your data is saved locally. Log in or sign up to save your data permanently.</p>
    </div>

    <div id="app-section">
      <div id="timer">0:00</div>
      <div id="timerBarContainer">
        <div id="timerBar"></div>
      </div>
      <div class="timer-controls">
        <input type="number" id="timeInput" class="input" value="25" min="1" />
        <button id="setButton" class="button">Set</button>
        <button id="startButton" class="button" disabled>Start</button>
        <button id="stopButton" class="button" disabled>Stop</button>
      </div>
      <hr class="custom-hr" />
      <div class="task-control-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." class="input" />
        <input type="date" id="taskDueDate" class="date-input" title="Set due date" /> <!-- Added this line -->
        <button id="addTaskButton" class="button">Add Task</button>
      </div>
      <div class="task-control-row">
            <select id="categorySelect" class="select-box" aria-label="Select task category">
                <option value="Personal">Personal</option>
                <option value="Work">Work</option>
                <option value="Health">Health</option>
                <option value="__custom__">Add New Category…</option>
            </select>
            <select id="prioritySelect" class="select-box" aria-label="Select task priority">
                <option value="Low">⚡ Low</option>
                <option value="Medium" selected>⚡ Medium</option>
                <option value="High">⚡ High</option>
                <option value="__custom__">Add New Priority…</option>
            </select>
</div>
<hr class="custom-hr" />
            <div id="taskCountToday" class="task-counter-line">
                <div class="task-counter-content">
                    <div class="counter-text">
                        <span class="count">0</span>
                    </div>
                    <div class="task-actions">
                        <button id="clearFinishedBtn" class="reset-button">Clear Done</button>
                        <button id="resetCountBtn" class="reset-button">Reset All</button>
                    </div>
                
            </div>
        </div>
        <hr class="custom-hr" />
        <ul id="taskList"></ul>

            <hr class="custom-hr" />
    </div>

  </div> <div id="notesSidebar" class="notes-sidebar">
    <div class="notes-header">
      <h2>Notes</h2>
      <button id="closeNotes" class="close-button">✖</button>
    </div>
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./supabase-init.js"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
