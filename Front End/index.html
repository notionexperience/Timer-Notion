<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav id="main-navbar">
    <div class="nav-left">
      <h1 class="nav-title">FocusFlow</h1>
      <button id="themeToggle" class="nav-button theme-toggle" aria-pressed="false" aria-label="Toggle theme">
   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
  <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z" />
</svg>
</button>
    <button id="toggleNotes" class="nav-button notes-toggle" aria-label="Toggle notes sidebar">  
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
  <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-8.4 8.4a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32l8.4-8.4Z" />

</svg>
</button>
    </div>

    <div class="nav-right">
      <span id="userEmailDisplay" class="user-email">Guest Mode</span>
      <div id="auth-nav-items">
        <input type="email" id="emailInput" placeholder="Email" class="nav-input" />
        <input type="password" id="passwordInput" placeholder="Password" class="nav-input" />
        <button id="signInBtn" class="nav-button">Sign In</button>
        <button id="signUpBtn" class="nav-button">Sign Up</button>
        <button id="sendResetEmailBtn" class="nav-button">Forgot Password?</button>
      </div>
      <div id="user-nav-items" style="display: none;">
        <button id="logoutBtn" class="nav-button">Logout</button>
      </div>


    </div>
  </nav>

  <div id="mainContent">
    <div id="auth-section">
      <!-- Auth forms (hidden if logged in) -->
      <p id="guestModeMessage" style="display: none;">You are in guest mode. Your data is saved locally. Log in or sign up to save your data permanently.</p>
    </div>

    <div id="app-section">
      <div id="timer">0:00</div>
      <div id="timerBarContainer">
        <div id="timerBar"></div>
      </div>
      <div class="timer-controls">
        <input type="number" id="timeInput" class="input" value="25" min="1" />
        <button id="setButton" class="button">Set</button>
        <button id="startButton" class="button" disabled>Start</button>
        <button id="stopButton" class="button" disabled>Stop</button>
      </div>
      <hr class="custom-hr" /> 
           <input type="text" id="taskInput" placeholder="Add a new task..." class="input" />
      <div class="task-control-row">
  

      </div>

      <div class="task-control-row">     
    
              <input type="date" id="taskDueDate" class="date-input" title="Set due date" />
              <!-- NEW: Time input for task due time -->
              <input type="time" id="taskDueTime" class="time-input" title="Set due time" />
              <input type="number" id="notificationTimeInput" class="input" placeholder="🔔" title="Minutes before due date to notify" min="0" value="15" />
            <select id="categorySelect" class="select-box" aria-label="Select task category">
                <option value="Personal">Personal</option>
                <option value="Home">Home</option>
                <option value="Work">Work</option>
                <option value="Health">Health</option>
                <option value="Finance">Finance</option>
                <option value="__custom__">Add New Category…</option>
            </select>
            <select id="prioritySelect" class="select-box" aria-label="Select task priority">
                <option value="Scheduled">Scheduled</option>
                <option value="Urgent">Urgent</option>
                <option value="High">High</option>
                <option value="Medium" selected>Medium</option>
                <option value="Low">Low</option>
                <option value="__custom__">Add New Priority…</option>
            </select>   
                <button id="addTaskButton" class="button">Add Task</button>    
            <div id="taskCountToday" class="task-counter-line">
                <div class="task-counter-content">
                    <div class="counter-text">
                        <span class="count">0</span>
                    </div>
                    <div class="task-actions">
                        <button id="clearFinishedBtn" class="reset-button">Clear Done</button>
                        <button id="resetCountBtn" class="reset-button">Reset All</button>
                
                            
                    </div>
             </div>
          </div>  
        
        </div>
        <hr class="custom-hr" />
        <ul id="taskList"></ul>

            <hr class="custom-hr" />
    </div>

  </div> <div id="notesSidebar" class="notes-sidebar">
    <div class="notes-header">
      <h2>Notes</h2>
      <button id="closeNotes" class="close-button" aria-label="Close notes">Close</button>

    </div>
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
  </div>
<audio id="timerEndSound" src="/Sounds/notification-sound-effect-372475.mp3" preload="auto"></audio>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./supabase-init.js"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
