<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav id="main-navbar">
    <div class="nav-left">
      <h1 class="nav-title">FocusFlow</h1>

    </div>

    <div class="nav-right"> 
           <button id="themeToggle" class="nav-button theme-toggle" aria-pressed="false" aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">

        </svg>
      </button>
      <button id="toggleNotes" class="nav-button notes-toggle" aria-label="Toggle notes sidebar">  
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-8.4 8.4a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32l8.4-8.4Z" />
          <path d="M5.25 5.25a3 3 0 0 0-3 3v10.5a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3V13.5a.75.75 0 0 0-1.5 0v5.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5V8.25a1.5 1.5 0 0 1 1.5-1.5h5.25a.75.75 0 0 0 0-1.5H5.25Z" />
        </svg>
      </button>
            <span id="userEmailDisplay" class="user-email">Guest Mode</span>
      <div id="auth-nav-items">
        <input type="email" id="emailInput" placeholder="Email" class="nav-input" />
        <input type="password" id="passwordInput" placeholder="Password" class="nav-input" />
        <button id="signInBtn" class="nav-button">Sign In</button>
        <button id="signUpBtn" class="nav-button">Sign Up</button>
        <button id="sendResetEmailBtn" class="nav-button">Forgot Password?</button>
      </div>

      <div id="user-nav-items" style="display: none;">
        <button id="logoutBtn" class="nav-button">Logout</button>
         
      </div>  
       
    </div>

  </nav>

 <div id="mainContent">

    <div class="grid-container"> <div class="timer-add-section grid-item">
            <div id="timer-section">
                <div id="timer">0:00</div>
                <div id="timerBarContainer">
                    <div id="timerBar"></div>
                </div>
                <div class="timer-controls">
                    <input type="number" id="timeInput" class="input" value="25" min="1" />
                    <button id="setButton" class="button">Set</button>
                    <button id="startButton" class="button" disabled>Start</button>
                    <button id="stopButton" class="button" disabled>Stop</button>
                </div>
            </div>
        </div>

        <div class="task-add-section grid-item">
            <div class="task-input-group">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Add a new task..."
                    class="input"
                />
                <button id="addTaskButton" class="button">Add Task</button>
            </div>

            <div class="task-details-row">
                <div class="input-field">
                    <label for="categorySelect"></label>
                    <select id="categorySelect" class="select-box" aria-label="Select task category">
                        <option value="Personal">Personal</option>
                        <option value="Home">Home</option>
                        <option value="Work">Work</option>
                        <option value="Health">Health</option>
                        <option value="Finance">Finance</option>
                        <option value="__custom__">Add New Category…</option>
                    </select>
                </div>
                <div class="input-field">
                    <label for="prioritySelect"></label>
                    <select id="prioritySelect" class="select-box" aria-label="Select task priority">
                        <option value="Scheduled">Scheduled</option>
                        <option value="Urgent">Urgent</option>
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                        <option value="__custom__">Add New Priority…</option>
                    </select>
                </div>
                <div class="input-field">
                    <label for="dueDate"></label>
                    <input type="date" id="dueDate" class="date-input" title="Set due date" />
                </div>
                <div class="input-field">
                    <label for="dueTime"></label>
                    <input type="time" id="dueTime" class="time-input" title="Set due time" />
                </div>
            </div>
        </div>
    </div> 
            <div id="taskCountToday" class="task-counter-line">
        <div class="task-counter-content">
            <div class="counter-text">
                <span class="count">0</span>
            </div>

            <div class="task-actions">
                <button id="clearFinishedBtn" class="reset-button">Clear Done</button>
                <button id="resetCountBtn" class="reset-button">Reset All</button>
            </div>
        </div>
    </div>
    <ul id="taskList"></ul>
</div>
  <div id="notesSidebar" class="notes-sidebar">
    <div class="notes-header">
    <h2 class="notes-title"><span class="circle-icon">📒</span> Notes</h2>
      <button id="closeNotes" class="close-button" aria-label="Close notes">X</button>
    </div>
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
    <!-- Optional: Add a preview area for markdown notes -->
    <!-- <div id="sidebar-notes-output" class="markdown-preview"></div> -->
  </div>

  <audio id="timerEndSound" src="/Sounds/notification-sound-effect-372475.mp3" preload="auto"></audio>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./supabase-init.js"></script>
  <script type="module" src="./script.js"></script>

  <!-- NEW: Task Edit Modal -->
  <div id="editTaskModal" class="modal">
    <div class="modal-content">

      <h2>Edit Task</h2>
      <input type="hidden" id="editTaskId">
      <div class="input-field">
        <label for="editTaskContent">Task:</label>
        <input type="text" id="editTaskContent" class="input">
      </div>
      <div class="task-details-row">
          <div class="input-field">
              <label for="editCategorySelect">Category:</label>
              <select id="editCategorySelect" class="select-box">
                  <option value="Personal">Personal</option>
                  <option value="Home">Home</option>
                  <option value="Work">Work</option>
                  <option value="Health">Health</option>
                  <option value="Finance">Finance</option>
                  <option value="__custom__">Add New Category…</option>
              </select>
          </div>
          <div class="input-field">
              <label for="editPrioritySelect">Priority:</label>
              <select id="editPrioritySelect" class="select-box">
                  <option value="Scheduled">Scheduled</option>
                  <option value="Urgent">Urgent</option>
                  <option value="High">High</option>
                  <option value="Medium">Medium</option>
                  <option value="Low">Low</option>
                  <option value="__custom__">Add New Priority…</option>
              </select>
          </div>
          <div class="input-field">
              <label for="editDueDate">Date:</label>
              <input type="date" id="editDueDate" class="date-input">
          </div>
          <div class="input-field">
              <label for="editDueTime">Time:</label>
              <input type="time" id="editDueTime" class="time-input">
          </div>
          <div class="input-field">
              <label for="editNotificationOffset">Notify (mins before):</label>
              <input type="number" id="editNotificationOffset" class="input" min="0" placeholder="e.g. 15">
          </div>
      </div>
      <div class="modal-buttons"> 
        <button id="saveEditButton" class="button">Save</button>
        <button id="cancelEditButton" class="button button-secondary">Cancel</button>
      </div>
    </div>
  </div>
  <!-- END NEW: Task Edit Modal -->

</body>
</html>
