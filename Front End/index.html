<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <script type="module" src="./script.js"></script>
  <link rel="stylesheet" href="./styles.css" />

</head>
<body>
  <button id="themeToggle" class="theme-toggle-button" aria-pressed="false">🌖 Theme</button>

  <div id="mainContent">
    <h1>FocusFlow</h1>

    <div class="timer-controls">
      <input type="number" id="timeInput" class="input" min="1" placeholder="Set Time" autocomplete="off" />
      <button id="setButton" class="button">Set</button>
      <button id="startButton" class="button" disabled>Start</button>
      <button id="stopButton" class="button" disabled>Stop</button>
    </div>

    <div id="timer">0:00</div>
    <div id="timerBarContainer">
      <div id="timerBar"></div>
    </div>

    <hr class="custom-hr" />

    <div class="task-input-container">
      <label for="taskInput" class="sr-only">Add a new task</label>
      <input type="text" id="taskInput" placeholder="Add a new task" aria-label="Task Name" />
      <button id="addTaskButton" class="button">Add Task</button>
    </div>

    <div class="task-control-row">
      <select class="select-box category-select" id="categorySelect">
        <option value="Work">🏷️ Work</option>
        <option value="Personal" selected>🏷️ Personal</option>
        <option value="Health">🏷️ Health</option>
        <option value="__custom__">Add New Category…</option>
      </select>

      <select class="select-box priority-select" id="prioritySelect">
        <option value="Low">⚡ Low</option>
        <option value="Medium" selected>⚡ Medium</option>
        <option value="High">⚡ High</option>
        <option value="__custom__">Add New Priority…</option>
      </select>

      <div id="taskCountToday" class="task-counter-line">
        <div class="task-counter-content">
          <div class="counter-text">
            <span class="count">0</span>
            <span class="label">tasks</span> </div>
          <div class="task-actions">
            <button id="clearFinishedBtn" class="reset-button">Clear Done</button> <button id="resetCountBtn" class="reset-button">Reset All</button> </div>
        </div>
      </div>
    </div>

    <hr class="custom-hr" />

    <button id="toggleNotes" class="notes-toggle">✎ Add Notes</button>

    <button id="undoResetBtn" class="undo-button" style="display: none;">Undo Reset</button>
  </div>

  <div id="auth-section">
    <h2>Login to FocusFlow</h2>
<input type="email" id="resetEmailInput" placeholder="Enter your email" />
    <button id="signUpBtn">Sign Up</button>
    <button id="signInBtn">Log In</button>
    <button id="sendResetEmailBtn">Set Password</button>
  </div>

  <div id="app-section" style="display:none;">
    <h2>Welcome to FocusFlow!</h2>
    <button id="logoutBtn">Logout</button>
    <ul id="taskList"></ul> </div>

  <div id="notesSidebar" class="notes-sidebar">
    <div class="notes-header">
      <h2>🗒️ Notes</h2>
      <button id="closeNotes" class="close-button">✖</button>
    </div>
    <div class="notes-body">
      <textarea id="notesArea" placeholder="Write your notes here..."></textarea>
      <div id="renderedNotes" class="markdown-output"></div>
    </div>
    <button id="resetNotesBtn" class="reset-notes-button">Reset Notes</button>
  </div>


</body>
</html>
