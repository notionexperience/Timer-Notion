<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <nav id="main-navbar">
    <div class="nav-left">
      <button id="themeToggle" class="theme-toggle-button" aria-pressed="false">🌖 Theme</button>
      <h1 class="nav-title">FocusFlow</h1>
    </div>

    <div class="nav-right">
      <button id="toggleNotes" class="nav-button notes-toggle">✎ Notes</button>

      <div id="auth-nav-items">
        <input type="email" id="emailInput" placeholder="Email" aria-label="Email" />
        <input type="password" id="passwordInput" placeholder="Password" aria-label="Password" />
        <button id="signInBtn" class="nav-button">Log In</button>
        <button id="signUpBtn" class="nav-button">Sign Up</button>
        <button id="sendResetEmailBtn" class="nav-button">Set Password</button>
      </div>

      <div id="user-nav-items" style="display: none;">
        <span id="userEmailDisplay" class="user-email"></span>
        <button id="logoutBtn" class="nav-button">Logout</button>
      </div>
    </div>
  </nav>

  <div id="mainContent">
    <div id="app-section">
        <p id="guestModeMessage" style="display:none;">
            You are in guest mode. Your tasks and notes are saved only on this device.
            <br>Sign up to save and sync across devices!
        </p>

        <div class="timer-controls">
            <input type="number" id="timeInput" class="input" min="1" placeholder="Set Time" autocomplete="off" />
            <button id="setButton" class="button">Set</button>
            <button id="startButton" class="button" disabled>Start</button>
            <button id="stopButton" class="button" disabled>Stop</button>
        </div>

        <div id="timer">0:00</div>
        <div id="timerBarContainer">
            <div id="timerBar"></div>
        </div>

        <hr class="custom-hr" />

        <div class="task-input-container">
            <label for="taskInput" class="sr-only">Add a new task</label>
            <input type="text" id="taskInput" placeholder="Add a new task" aria-label="Task Name" />
            <button id="addTaskButton" class="button">Add Task</button>
        </div>

        <div class="task-control-row">
            <select class="select-box category-select" id="categorySelect">
                <option value="Work">🏷️ Work</option>
                <option value="Personal" selected>🏷️ Personal</option>
                <option value="Health">🏷️ Health</option>
                <option value="__custom__">Add New Category…</option>
            </select>

            <select class="select-box priority-select" id="prioritySelect">
                <option value="Low">⚡ Low</option>
                <option value="Medium" selected>⚡ Medium</option>
                <option value="High">⚡ High</option>
                <option value="__custom__">Add New Priority…</option>
            </select>

            <div id="taskCountToday" class="task-counter-line">
                <div class="task-counter-content">
                    <div class="counter-text">
                        <span class="count">0</span>
                        <span class="label">tasks</span>
                    </div>
                    <div class="task-actions">
                        <button id="clearFinishedBtn" class="reset-button">Clear Done</button>
                        <button id="resetCountBtn" class="reset-button">Reset All</button>
                    </div>
                </div>
            </div>
        </div>

        <ul id="taskList"></ul>

        <hr class="custom-hr" />

        <button id="undoResetBtn" class="undo-button">Undo Reset</button>
    </div>
  </div> <div id="notesSidebar" class="notes-sidebar">
    <div class="notes-header">
      <h2>🗒️ Notes</h2>
      <button id="closeNotes" class="close-button">✖</button>
    </div>
    <textarea id="notes" placeholder="Write your notes here..."></textarea>
    <button id="resetNotesBtn" class="reset-notes-button">Reset Notes</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./script.js"></script>
  <script src="./supabase-init.js" type="module"></script>
</body>
</html>
