
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow – Task Timer with Notes & Priorities</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    .task-item { margin-bottom: 10px; padding: 10px; background: #fff; border: 1px solid #ccc; border-radius: 8px; }
    .task-text { display: inline-block; margin: 0 10px; }
    .subtask-list { margin-top: 8px; padding-left: 20px; }
    .subtask-list li { list-style-type: disc; }
    .button, .add-subtask-button { margin-top: 5px; padding: 4px 8px; cursor: pointer; }
    .input, .select-box { padding: 4px; margin: 5px 0; }
  </style>
</head>
<body>

  <div class="task-input-container">
    <input type="text" id="taskInput" placeholder="Add a new task" />
    <button id="addTaskButton" class="button">Add Task</button>
  </div>

  <ul id="taskList"></ul>

  <script>
    const taskInput = document.getElementById("taskInput");
    const addTaskButton = document.getElementById("addTaskButton");
    const taskList = document.getElementById("taskList");

    function saveTasks() {
      const tasks = [];
      document.querySelectorAll("#taskList > li.task-item").forEach(li => {
        const text = li.querySelector(".task-text").dataset.raw || "";
        const subtasks = [];
        li.querySelectorAll(".subtask-list > li").forEach(subLi => {
          const subText = subLi.querySelector(".task-text").dataset.raw || "";
          const subDone = subLi.querySelector("input[type=checkbox]").checked;
          subtasks.push({ text: subText, done: subDone });
        });
        tasks.push({ text, subtasks });
      });
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
      const data = localStorage.getItem("tasks");
      if (!data) return;
      JSON.parse(data).forEach(task => {
        const li = createTaskElement(task.text, task.subtasks || []);
        taskList.appendChild(li);
      });
    }

    function createTaskElement(text, subtasks = []) {
      const li = document.createElement("li");
      li.className = "task-item";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";

      const span = document.createElement("span");
      span.className = "task-text";
      span.innerHTML = marked.parseInline(text);
      span.dataset.raw = text;

      const addSubtaskBtn = document.createElement("button");
      addSubtaskBtn.textContent = "+ Subtask";
      addSubtaskBtn.className = "add-subtask-button";

      const subtaskList = document.createElement("ul");
      subtaskList.className = "subtask-list";

      addSubtaskBtn.addEventListener("click", () => {
        const subText = prompt("Subtask:");
        if (!subText) return;
        const subLi = document.createElement("li");
        const subCheckbox = document.createElement("input");
        subCheckbox.type = "checkbox";
        const subSpan = document.createElement("span");
        subSpan.className = "task-text";
        subSpan.innerHTML = marked.parseInline(subText);
        subSpan.dataset.raw = subText;
        subLi.appendChild(subCheckbox);
        subLi.appendChild(subSpan);
        subtaskList.appendChild(subLi);
        saveTasks();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(addSubtaskBtn);
      li.appendChild(subtaskList);

      subtasks.forEach(sub => {
        const subLi = document.createElement("li");
        const subCheckbox = document.createElement("input");
        subCheckbox.type = "checkbox";
        subCheckbox.checked = sub.done;
        const subSpan = document.createElement("span");
        subSpan.className = "task-text";
        subSpan.innerHTML = marked.parseInline(sub.text);
        subSpan.dataset.raw = sub.text;
        subLi.appendChild(subCheckbox);
        subLi.appendChild(subSpan);
        subtaskList.appendChild(subLi);
      });

      return li;
    }

    addTaskButton.addEventListener("click", () => {
      const text = taskInput.value.trim();
      if (!text) return;
      const li = createTaskElement(text);
      taskList.appendChild(li);
      taskInput.value = "";
      saveTasks();
    });

    window.addEventListener("DOMContentLoaded", loadTasks);
  </script>
</body>
</html>
